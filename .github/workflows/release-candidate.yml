name: Release Candidate

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  artifact:
    name: Package Ad-Hoc Candidate
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run release preflight
        run: ./Scripts/release.sh preflight

      - name: Package ad-hoc release candidate
        run: ./Scripts/release.sh artifact

      - name: Smoke release-candidate packaged MCP roundtrip
        run: |
          ./Scripts/smoke_packaged_mcp_roundtrip.sh \
            ".build/release/RepoPrompt.app" \
            "Release-candidate packaged app" \
            ".build/release/RepoPrompt-artifact-manifest.json"
      - name: Upload release-candidate artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: RepoPrompt-CE-release-candidate
          path: dist/*
          if-no-files-found: error
