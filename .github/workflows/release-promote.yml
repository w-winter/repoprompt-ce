name: Promote Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing reviewed source draft tag to promote
        required: true
        type: string
      reviewed_checksums_sha256:
        description: SHA-256 digest of the reviewed source-draft SHA256SUMS file
        required: true
        type: string

concurrency:
  group: stable-release-channel
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-ref:
    name: Validate Approved Release Ref
    if: github.ref == 'refs/heads/main'
    runs-on: macos-26
    outputs:
      commit: ${{ steps.release-ref.outputs.commit }}
      tooling-commit: ${{ steps.release-ref.outputs.tooling-commit }}
    steps:
      - name: Check out trusted release tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Require a tag reachable from protected main
        id: release-ref
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          echo "commit=$(./Scripts/verify_release_ref.sh "$RELEASE_TAG")" >> "$GITHUB_OUTPUT"
          echo "tooling-commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  smoke-reviewed-helper:
    name: Smoke Reviewed Helper Without Release Secrets
    needs: validate-ref
    if: github.ref == 'refs/heads/main'
    runs-on: macos-26
    # GitHub hides draft release assets from read-only workflow tokens. This
    # token is used only by the download step; helper execution below uses env -i.
    permissions:
      contents: write
    steps:
      - name: Check out trusted release tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.validate-ref.outputs.tooling-commit }}
          path: trusted-control-plane
          fetch-depth: 1
          persist-credentials: false

      - name: Download reviewed ZIP and checksum manifest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          SOURCE_GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir reviewed-assets
          gh release download "$RELEASE_TAG" \
            --repo "$SOURCE_GITHUB_REPOSITORY" \
            --dir reviewed-assets \
            --pattern '*.zip' \
            --pattern SHA256SUMS \
            --pattern '*-artifact-manifest.json'

      - name: Verify reviewed ZIP checksum binding
        env:
          REVIEWED_CHECKSUMS_SHA256: ${{ inputs.reviewed_checksums_sha256 }}
        run: |
          set -euo pipefail
          checksums=reviewed-assets/SHA256SUMS
          actual_digest="$(shasum -a 256 "$checksums" | awk '{ print $1 }')"
          [[ "$actual_digest" == "$REVIEWED_CHECKSUMS_SHA256" ]] || { echo "Reviewed SHA256SUMS digest mismatch" >&2; exit 1; }
          shopt -s nullglob
          archives=(reviewed-assets/*.zip)
          artifact_manifests=(reviewed-assets/*-artifact-manifest.json)
          [[ "${#archives[@]}" == "1" ]] || { echo "Expected exactly one reviewed ZIP" >&2; exit 1; }
          [[ "${#artifact_manifests[@]}" == "1" ]] || { echo "Expected exactly one reviewed artifact manifest" >&2; exit 1; }
          grep -F "  $(basename "${archives[0]}")" "$checksums" > reviewed-assets/reviewed-zip.sha256
          [[ "$(wc -l < reviewed-assets/reviewed-zip.sha256 | tr -d ' ')" == "1" ]] || { echo "Reviewed ZIP checksum entry mismatch" >&2; exit 1; }
          (cd reviewed-assets && shasum -a 256 -c reviewed-zip.sha256)
          mkdir extracted
          ditto -x -k "${archives[0]}" extracted
          ./trusted-control-plane/Scripts/validate_embedded_mcp_helper_layout.sh \
            "extracted/RepoPrompt CE.app" \
            "Reviewed ZIP MCP helper layout"
          ./trusted-control-plane/Scripts/validate_app_architectures.sh \
            "extracted/RepoPrompt CE.app" \
            "arm64,x86_64" \
            "Reviewed ZIP app"
          ./trusted-control-plane/Scripts/write_app_artifact_manifest.py verify \
            --app "extracted/RepoPrompt CE.app" \
            --manifest "${artifact_manifests[0]}" \
            --expected-architectures "arm64,x86_64"
          echo "ARTIFACT_MANIFEST_PATH=${artifact_manifests[0]}" >> "$GITHUB_ENV"

      - name: Execute reviewed helper and packaged roundtrip without inherited secrets
        env:
          REPOPROMPT_PACKAGED_SMOKE_TIMEOUT: "240"
          REPOPROMPT_PACKAGED_SMOKE_HELPER_TIMEOUT: "60"
        run: |
          env -i \
            PATH=/usr/bin:/bin:/usr/sbin:/sbin \
            HOME="$HOME" \
            TMPDIR="$RUNNER_TEMP" \
            USER="$USER" \
            LOGNAME="$LOGNAME" \
            ./trusted-control-plane/Scripts/smoke_embedded_mcp_helper.sh \
            "extracted/RepoPrompt CE.app" \
            "Reviewed ZIP MCP helper"
          env -i \
            PATH=/usr/bin:/bin:/usr/sbin:/sbin \
            HOME="$HOME" \
            TMPDIR="$RUNNER_TEMP" \
            USER="$USER" \
            LOGNAME="$LOGNAME" \
            REPOPROMPT_PACKAGED_SMOKE_TIMEOUT="$REPOPROMPT_PACKAGED_SMOKE_TIMEOUT" \
            REPOPROMPT_PACKAGED_SMOKE_HELPER_TIMEOUT="$REPOPROMPT_PACKAGED_SMOKE_HELPER_TIMEOUT" \
            ./trusted-control-plane/Scripts/smoke_packaged_mcp_roundtrip.sh \
            "extracted/RepoPrompt CE.app" \
            "Reviewed packaged app" \
            "$ARTIFACT_MANIFEST_PATH"

  promote:
    name: Mirror and Promote Reviewed Draft
    needs:
      - validate-ref
      - smoke-reviewed-helper
    if: github.ref == 'refs/heads/main'
    environment: release
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Check out trusted release tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.validate-ref.outputs.tooling-commit }}
          path: trusted-control-plane
          fetch-depth: 0
          persist-credentials: false

      - name: Check out approved tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.validate-ref.outputs.commit }}
          path: release-source
          fetch-depth: 0
          persist-credentials: false

      - name: Verify, mirror, and promote reviewed assets
        env:
          REPOPROMPT_CONTROL_PLANE_SCRIPTS_DIR: ${{ github.workspace }}/trusted-control-plane/Scripts
          REPOPROMPT_RELEASE_SOURCE_ROOT: ${{ github.workspace }}/release-source
          SOURCE_GH_TOKEN: ${{ github.token }}
          PUBLIC_UPDATE_GH_TOKEN: ${{ secrets.PUBLIC_UPDATE_REPOSITORY_TOKEN }}
          RELEASE_COMMIT: ${{ needs.validate-ref.outputs.commit }}
          RELEASE_TAG: ${{ inputs.tag }}
          REVIEWED_CHECKSUMS_SHA256: ${{ inputs.reviewed_checksums_sha256 }}
          SOURCE_GITHUB_REPOSITORY: ${{ github.repository }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: ./trusted-control-plane/Scripts/promote_release.sh promote
